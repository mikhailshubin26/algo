services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # --- Judge0 CE (self-hosted) ---
  judge0-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data

  judge0-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - judge0_redis_data:/data

  judge0-server:
    image: judge0/judge0:1.13.0
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
      SECRET_KEY_BASE: ${JUDGE0_SECRET_KEY_BASE}
      RAILS_ENV: production
    privileged: true
    restart: always
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-worker:
    image: judge0/judge0:1.13.0
    command: ["./scripts/workers"]
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_POSTGRES_PASSWORD}
      SECRET_KEY_BASE: ${JUDGE0_SECRET_KEY_BASE}
      RAILS_ENV: production
    privileged: true
    restart: always
    depends_on:
      - judge0-server

volumes:
  postgres_data:
  judge0_postgres_data:
  judge0_redis_data:
